; Waveshare ESP32-S3-Touch-LCD-2 Kid Camera
; ESP32-S3-WROOM-1 (N8R8): 8MB Flash, 8MB OPI PSRAM
[env:ws_esp32s3_touch_lcd2]
platform = espressif32 @ 5.3.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash / PSRAM
board_build.flash_mode       = qio
board_build.flash_size       = 8MB
board_build.psram_type       = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions       = default_8MB.csv

; USB CDC (used for Serial via USB-C)
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

monitor_speed  = 115200
upload_speed   = 921600
upload_protocol = esptool

lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.0
    ESP32Async/ESPAsyncWebServer @ ^3.7.6
    ESP32Async/AsyncTCP @ ^3.3.6
    bitbank2/JPEGDEC @ ^1.2.0
